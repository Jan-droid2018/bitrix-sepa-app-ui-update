<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Bitrix24 Autorisierung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='bitrix24-app.css', v='20260323k') }}"/>
</head>
<body class="bitrix-app">
    <div class="page-shell narrow-shell">
        <section class="workspace-shell">
            <div class="workspace-inner">
                <div class="workspace-brand">
                    <img class="workspace-logo" src="{{ url_for('main.asset_file', filename='Logo_premium-technologies_2021_neg_RGB_1000px.png', v='20260323g') }}" alt="Premium Technologies"/>
                </div>
                <div class="workspace-head centered-head">
                    <div>
                        <h1 class="workspace-title">Bitrix24 Verbindung</h1>
                    </div>
                </div>
                <div class="bitrix-tabs centered-tabs">
                    <span class="bitrix-tab active">Autorisierung</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-body">
                <div class="metric-card status-card" id="statusCard">
                    <div class="metric-label">Status</div>
                    <div class="metric-value" id="statusTitle">Verbindung wird vorbereitet</div>
                    <div class="metric-note status-copy" id="statusText">Auth-Daten werden aus Bitrix24 geladen...</div>
                </div>
            </div>
        </section>
    </div>

    <form id="authform" method="post" action="/"></form>

    <script src="https://api.bitrix24.com/api/v1/"></script>
    <script src="{{ url_for('static', filename='bitrix24-embed.js', v='20260323e') }}"></script>
    <script>
    (function () {
        const TIMEOUT_MS = 3000;
        let finished = false;
        const statusCard = document.getElementById("statusCard");
        const statusTitle = document.getElementById("statusTitle");
        const statusText = document.getElementById("statusText");

        function showError(msg) {
            if (finished) return;
            finished = true;
            statusCard.classList.add("error");
            statusTitle.textContent = "Autorisierung nicht möglich";
            statusText.innerHTML =
                msg + "<br><br>" +
                "Diese Anwendung kann nur aus Bitrix24 heraus geöffnet werden.";
        }

        function submitAuth(auth) {
            if (finished) return;
            finished = true;
            statusTitle.textContent = "Bitrix24 Kontext erkannt";
            statusText.textContent = "Die App wird jetzt mit dem gültigen OAuth-Kontext gestartet...";

            const form = document.getElementById("authform");

            function add(name, value) {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = name;
                input.value = value || "";
                form.appendChild(input);
            }

            Object.keys(auth).forEach((key) => add("auth[" + key + "]", auth[key]));

            if (window.BX24 && BX24.getDomain) {
                add("auth[domain]", BX24.getDomain());
            }

            form.submit();
        }

        if (!window.BX24 || !BX24.init) {
            showError("BX24 API ist nicht verfügbar.");
            return;
        }

        statusTitle.textContent = "Bitrix24 wird initialisiert";
        statusText.textContent = "Die App wartet auf den OAuth-Kontext aus dem Portal.";

        const timer = setTimeout(function () {
            showError("Timeout beim Initialisieren von Bitrix24.");
        }, TIMEOUT_MS);

        BX24.init(function () {
            clearTimeout(timer);

            let auth;
            try {
                auth = BX24.getAuth();
            } catch (error) {
                showError("Fehler beim Lesen der Auth-Daten.");
                return;
            }

            if (!auth || !auth.access_token) {
                showError("Kein gültiger OAuth-Kontext gefunden.");
                return;
            }

            submitAuth(auth);
        });
    })();
    </script>
</body>
</html>
