<!doctype html>
<html lang="{{ app_lang }}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>{{ t("auth.title") }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='bitrix24-app.css', v='20260409b') }}"/>
</head>
<body class="bitrix-app auth-bootstrap" data-app-lang="{{ app_lang }}" data-language-mode="{{ language_mode }}">
    <div class="page-shell narrow-shell">
        <section class="workspace-shell">
            <div class="workspace-inner">
                <div class="workspace-brand">
                    <img class="workspace-logo" src="{{ url_for('main.asset_file', filename='Logo_premium-technologies_2021_neg_RGB_1000px.png', v='20260323g') }}" alt="Premium Technologies"/>
                </div>
                <div class="workspace-head centered-head">
                    <div>
                        <h1 class="workspace-title">{{ t("auth.heading") }}</h1>
                    </div>
                </div>
                <div class="bitrix-tabs centered-tabs">
                    <span class="bitrix-tab active">{{ t("auth.tab") }}</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-body">
                <div class="metric-card status-card" id="statusCard">
                    <div class="metric-label">{{ t("auth.status_label") }}</div>
                    <div class="metric-value" id="statusTitle">{{ t("auth.status.preparing.title") }}</div>
                    <div class="metric-note status-copy" id="statusText">{{ t("auth.status.preparing.body") }}</div>
                </div>
            </div>
        </section>
    </div>

    <form id="authform" method="post" action="/"></form>

    <script src="https://api.bitrix24.com/api/v1/"></script>
    <script src="{{ url_for('static', filename='bitrix24-embed.js', v='20260409d') }}"></script>
    <script>
    (function () {
        const TIMEOUT_MS = 3000;
        let finished = false;
        const statusCard = document.getElementById("statusCard");
        const statusTitle = document.getElementById("statusTitle");
        const statusText = document.getElementById("statusText");
        const authUnavailableText = {{ t("auth.status.error.body")|tojson }};

        function showError(msg) {
            if (finished) return;
            finished = true;
            statusCard.classList.add("error");
            statusTitle.textContent = {{ t("auth.status.error.title")|tojson }};
            statusText.innerHTML = msg + "<br><br>" + authUnavailableText;
        }

        function submitAuth(auth, portalLang) {
            if (finished) return;
            finished = true;
            statusTitle.textContent = {{ t("auth.status.context_detected.title")|tojson }};
            statusText.textContent = {{ t("auth.status.context_detected.body")|tojson }};

            const form = document.getElementById("authform");

            function add(name, value) {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = name;
                input.value = value || "";
                form.appendChild(input);
            }

            Object.keys(auth).forEach((key) => add("auth[" + key + "]", auth[key]));

            if (window.BX24 && BX24.getDomain) {
                add("auth[domain]", BX24.getDomain());
            }

            if (portalLang) {
                add("auth[lang]", portalLang);
            }

            form.submit();
        }

        if (!window.BX24 || !BX24.init) {
            showError({{ t("auth.error.bx24_unavailable")|tojson }});
            return;
        }

        statusTitle.textContent = {{ t("auth.status.initializing.title")|tojson }};
        statusText.textContent = {{ t("auth.status.initializing.body")|tojson }};

        const timer = setTimeout(function () {
            showError({{ t("auth.error.timeout")|tojson }});
        }, TIMEOUT_MS);

        BX24.init(function () {
            clearTimeout(timer);

            let auth;
            let portalLang = "";
            try {
                auth = BX24.getAuth();
                if (typeof BX24.getLang === "function") {
                    portalLang = BX24.getLang() || "";
                }
            } catch (error) {
                showError({{ t("auth.error.auth_read")|tojson }});
                return;
            }

            if (!auth || !auth.access_token) {
                showError({{ t("auth.error.no_oauth")|tojson }});
                return;
            }

            submitAuth(auth, portalLang);
        });
    })();
    </script>
</body>
</html>
